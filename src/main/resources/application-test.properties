# ============================================================
# Profile: test (default)
# Banco H2 in-memory - zero instalacao, ideal para demonstracao academica
# ============================================================

# Datasource H2 in-memory
spring.datasource.url=jdbc:h2:mem:livrariadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (acesso em http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Carga de dados inicial (data.sql)
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Thymeleaf
spring.thymeleaf.cache=false