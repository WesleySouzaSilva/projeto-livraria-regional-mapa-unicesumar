# ============================================================
# Profile: test (default)
# Banco H2 in-memory - zero instalacao, ideal para demonstracao academica
#
# Isolamento entre classes de teste e garantido pelo surefire
# (forkCount=1, reuseForks=false em pom.xml) - cada classe de teste
# roda em uma JVM separada, entao o H2 comeca vazio toda vez.
# ============================================================

# Datasource H2 in-memory
# Nota: o data.sql usa IDs explicitos (1, 2, 3, ...). No H2, IDENTITY column
# nao move o auto-increment quando recebe ID explicito, entao o data.sql
# termina com ALTER TABLE ... RESTART WITH N para reposicionar o contador.
spring.datasource.url=jdbc:h2:mem:livrariadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (acesso em http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Carga de dados inicial (data.sql)
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Thymeleaf
spring.thymeleaf.cache=false