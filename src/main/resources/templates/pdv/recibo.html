<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Recibo de Venda</title>
</head>
<body>
<main layout:fragment="content">

    <h1>Recibo de Venda</h1>

    <p>
        <strong>Venda #<span th:text="${venda.id}">0</span></strong>
        &middot;
        <span th:text="${#temporals.format(venda.dataVenda, 'dd/MM/yyyy HH:mm')}">data</span>
        &middot;
        Status: <span th:text="${venda.status}">CONCLUIDA</span>
    </p>

    <p>
        Filial: <strong th:text="${venda.filial.nome}">Filial</strong>
        &middot;
        Atendente: <strong th:text="${venda.usuario.nome}">Atendente</strong>
        &middot;
        Cliente:
        <strong th:if="${venda.cliente != null}" th:text="${venda.cliente.nome}">Cliente</strong>
        <em th:if="${venda.cliente == null}">Nao identificado</em>
    </p>

    <table>
        <thead>
            <tr>
                <th>Codigo</th>
                <th>Produto</th>
                <th>Qtd</th>
                <th>Preco Unit.</th>
                <th>Subtotal</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="item : ${venda.itens}">
                <td th:text="${item.produto.codigo}">COD</td>
                <td th:text="${item.produto.nome}">Nome</td>
                <td th:text="${item.quantidade}">1</td>
                <td th:text="${#numbers.formatCurrency(item.precoUnitario)}">R$ 0,00</td>
                <td th:text="${#numbers.formatCurrency(item.subtotal)}">R$ 0,00</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="4" style="text-align:right;"><strong>Total:</strong></td>
                <td>
                    <strong th:text="${#numbers.formatCurrency(venda.total)}">R$ 0,00</strong>
                </td>
            </tr>
        </tfoot>
    </table>

    <p style="margin-top:24px;">
        <a th:href="@{/pdv}">Nova venda</a>
        &middot;
        <a th:href="@{/pdv/historico}">Historico</a>
    </p>

</main>
</body>
</html>
