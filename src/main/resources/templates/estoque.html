<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Estoque</title>
</head>
<body>
<main class="container" layout:fragment="content">
    <h1>Estoque</h1>

    <p th:if="${filialSelecionada != null}">
        Filial: <strong th:text="${filialSelecionada.nome}"></strong>
    </p>

    <form th:if="${isGerente}" method="get" action="/dashboard/estoque" class="form-inline">
        <label for="filialId">Filtrar filial:</label>
        <select id="filialId" name="filialId" class="form-control">
            <option value="">Todas</option>
            <option th:each="f : ${filiais}"
                    th:value="${f.id}"
                    th:text="${f.nome}"
                    th:selected="${filialSelecionada != null and filialSelecionada.id == f.id}">
            </option>
        </select>
        <button type="submit" class="btn btn-primary">Aplicar</button>
    </form>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <table class="table">
        <thead>
            <tr>
                <th>Produto</th>
                <th>Filial</th>
                <th class="num">Quantidade</th>
                <th class="num">Minimo</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${#lists.isEmpty(linhas)}">
                <td colspan="5">Nenhum item em estoque.</td>
            </tr>
            <tr th:each="l : ${linhas}"
                th:classappend="${l.critico} ? 'critico' : ''">
                <td>
                    <strong th:text="${l.produtoCodigo}"></strong> -
                    <span th:text="${l.produtoNome}"></span>
                </td>
                <td th:text="${l.filialNome}"></td>
                <td class="num" th:text="${l.quantidade}"></td>
                <td class="num" th:text="${l.estoqueMinimo}"></td>
                <td>
                    <span th:if="${l.critico}" class="badge critico">Critico</span>
                    <span th:unless="${l.critico}" class="badge ok">OK</span>
                </td>
            </tr>
        </tbody>
    </table>
</main>
</body>
</html>
