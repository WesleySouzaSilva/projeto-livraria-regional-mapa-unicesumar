<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Livraria Regional</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="login-page">

<main class="login-card">
    <h1>Livraria Regional</h1>
    <p class="subtitle">Acesso ao sistema</p>

    <div th:if="${error}"  class="alert alert-error"   th:text="${error}"></div>
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <form th:action="@{/login}" method="post" class="login-form">
        <label for="login">Usuario</label>
        <input id="login" name="login" type="text" required autofocus>

        <label for="senha">Senha</label>
        <input id="senha" name="senha" type="password" required>

        <button type="submit">Entrar</button>
    </form>

    <p class="hint">Acesso de teste: <code>gerente/admin123</code> ou <code>atendente/atendente123</code></p>
</main>

</body>
</html>
