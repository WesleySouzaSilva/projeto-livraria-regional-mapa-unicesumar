# ============================================================
# Profile: prod
# Banco MySQL em producao - requer servidor MySQL rodando.
# NAO E O PROFILE PADRAO. Usar apenas em implantacao real:
#   java -jar app.jar --spring.profiles.active=prod
#
# ------------------------------------------------------------------------
# O QUE O USUARIO PRECISA FAZER NO SERVIDOR MYSQL (apenas uma vez):
#   1. Criar o usuario e senha de acesso ao banco:
#        CREATE USER 'livraria'@'%' IDENTIFIED BY 'changeme';
#        GRANT ALL PRIVILEGES ON *.* TO 'livraria'@'%';
#        FLUSH PRIVILEGES;
#   2. Exportar as variaveis de ambiente abaixo antes de subir a app.
#
# O QUE A APLICACAO FAZ AUTOMATICAMENTE:
#   - Cria o banco de dados (createDatabaseIfNotExist=true na URL JDBC)
#   - Cria/atualiza todas as tabelas a partir das entidades JPA
#     (spring.jpa.hibernate.ddl-auto=update)
#   - Em producao o data.sql NAO e executado (sql.init.mode=never).
#     Cadastros iniciais (filiais, livros, usuarios) devem ser feitos
#     via tela ou via script manual pelo DBA.
# ------------------------------------------------------------------------
#
# Variaveis de ambiente esperadas (NAO commitar valores reais):
#   MYSQL_HOST     - hostname do servidor MySQL
#   MYSQL_PORT     - porta (padrao 3306)
#   MYSQL_DB       - nome do banco (ex: livrariadb)
#   MYSQL_USER     - usuario do banco (criado manualmente no MySQL)
#   MYSQL_PASSWORD - senha do usuario
#
# Exemplo de start em producao:
#   export MYSQL_HOST=localhost
#   export MYSQL_PORT=3306
#   export MYSQL_DB=livrariadb
#   export MYSQL_USER=livraria
#   export MYSQL_PASSWORD=changeme
#   java -jar app.jar --spring.profiles.active=prod
# ============================================================

# Datasource MySQL (via variaveis de ambiente).
# createDatabaseIfNotExist=true -> o driver cria o schema na primeira
# conexao caso ele nao exista, evitando passo manual de CREATE DATABASE.
spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DB}?useSSL=true&serverTimezone=America/Sao_Paulo&createDatabaseIfNotExist=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}

# Pool de conexoes
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate - 'update' cria/mantem as tabelas a partir das entidades.
# Em prod, alterar uma entidade atualiza a coluna correspondente sem perder dados.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# data.sql NAO roda em prod (evita inserir seed padrao no banco real).
# Cadastros iniciais devem ser feitos pela aplicacao (PR4/PR5) ou pelo DBA.
spring.sql.init.mode=never

# Console H2 desabilitado em producao (MySQL assume o papel)
spring.h2.console.enabled=false

# Thymeleaf com cache em producao
spring.thymeleaf.cache=true

# Logs mais silenciosos em producao
logging.level.org.hibernate.SQL=WARN